<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARESGUARD: MISSION CONTROL</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="critical-banner">CRITICAL OVERRIDE: ENVIRONMENTAL PARAMETERS BEYOND SAFETY LIMITS</div>

    <header class="top-bar">
        <h1>ARESGUARD // MISSION CONTROL</h1>
        <div class="system-status">
            <select id="user-role" onchange="updateInterfaceRole()">
                <option value="specialist">Mission Specialist</option>
                <option value="engineer">System Engineer</option>
            </select>
            <span id="conn-status">CONNECTING...</span>
        </div>
    </header>

    <main class="dashboard">
        <section class="sensor-grid" id="sensor-grid">
            </section>

        <section id="controls-section">
            <h3 class="section-title">Manual Actuator Overrides</h3>
            <div class="control-grid">
                <div class="control-card">
                    <span class="actuator-label">Cooling Fan</span>
                    <label class="toggle-switch">
                        <input type="checkbox" onchange="toggleActuator('cooling_fan', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-card">
                    <span class="actuator-label">Habitat Heater</span>
                    <label class="toggle-switch">
                        <input type="checkbox" onchange="toggleActuator('habitat_heater', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-card">
                    <span class="actuator-label">Ventilation</span>
                    <label class="toggle-switch">
                        <input type="checkbox" onchange="toggleActuator('hall_ventilation', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-card">
                    <span class="actuator-label">Humidifier</span>
                    <label class="toggle-switch">
                        <input type="checkbox" onchange="toggleActuator('entrance_humidifier', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </section>

        <footer class="terminal">
            <div id="log-console"></div>
        </footer>
    </main>

    <script src="../js/script.js"></script>
</body>
</html>
